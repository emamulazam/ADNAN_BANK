<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #ffffff;
            padding: 35px;
            border-radius: 15px;
            width: 320px;
            color: #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid #e6e6e6;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #222;
        }

        label {
            font-size: 14px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            margin-bottom: 15px;
            background: #fafafa;
            transition: 0.3s;
        }

        input:focus {
            border-color: #0072ff;
            box-shadow: 0 0 5px rgba(0, 114, 255, 0.3);
            background: #fff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.04);
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }

        .footer a {
            color: #0072ff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="login-card">

    <h2>💰 Login to Bank</h2>

    <form method="POST">

        <label>Account Number</label><br>
        <input type="text" name="account_number" required>

        <label>Password</label><br>
        <input type="password" name="password" required>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        Don't have an account? <a href="/signup">Sign up</a>
    </div>

</div>

</body>
</html>
