<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Bank</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>💰 Dashboard</h2>

  <div class="card">
    <h3>Check Balance</h3>
    <input type="text" placeholder="Account Number">
    <button>View Balance</button>
  </div>

  <div class="card">
    <h3>Transfer Money</h3>
    <input type="text" placeholder="Sender Account">
    <input type="text" placeholder="Receiver Account">
    <input type="number" placeholder="Amount">
    <button>Transfer</button>
  </div>

  <div class="card">
    <h3>Transaction History</h3>
    <button>Load Transactions</button>
  </div>

</div>

</body>
</html>
