<!DOCTYPE html>
<html>
<head>
  <title>Signup - Bank</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f7fb;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #ffffff;
      padding: 35px;
      border-radius: 18px;
      width: 340px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      border: 1px solid #e6e6e6;
    }

    h2 {
      margin-bottom: 20px;
      color: #222;
    }

    form input {
      width: 100%;
      padding: 11px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      background: #fafafa;
      transition: 0.3s;
    }

    form input:focus {
      border-color: #0072ff;
      box-shadow: 0 0 5px rgba(0,114,255,0.3);
      background: #fff;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to right, #0072ff, #00c6ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.04);
      box-shadow: 0 5px 15px rgba(0,114,255,0.3);
    }

    p {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }

    a {
      color: #0072ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

<div class="container">
  <h2>🏦 Create Account</h2>

  <form method="POST">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Create Account</button>
  </form>

  <p>Already have an account? <a href="/login">Login</a></p>
</div>

</body>
</html>
