<!DOCTYPE html>
<html>
<head>
    <title>Logged Out</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            width: 340px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid #e6e6e6;
        }

        h1 {
            font-size: 24px;
            color: #222;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .home-btn {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        .home-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.3);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

<div class="card">

    <div class="icon">👋</div>

    <h1>You have been logged out</h1>

    <p>Your session has been cleared successfully.</p>

    <a href="/" class="home-btn">🏠 Go to Home</a>

</div>

</body>
</html>
